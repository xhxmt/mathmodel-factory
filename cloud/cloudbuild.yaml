steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/solver-images/solver-api:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/solver-images/solver-api:latest'
      - '.'
    dir: 'cloud'

  # Step 2: Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/solver-images/solver-api'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'solver-api'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/solver-images/solver-api:latest'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '8Gi'
      - '--cpu'
      - '4'
      - '--timeout'
      - '3600'
      - '--concurrency'
      - '1'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--service-account'
      - 'solver-runner@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=${PROJECT_ID},SOLVER_BUCKET=${PROJECT_ID}-solver-jobs'

# Substitutions
substitutions:
  _REGION: 'europe-west4'

# Timeout for the entire build
timeout: '1800s'

# Options
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Images to be pushed (for build artifacts)
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/solver-images/solver-api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/solver-images/solver-api:latest'
